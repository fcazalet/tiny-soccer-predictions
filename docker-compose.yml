services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tinysp_app
    restart: unless-stopped
    volumes:
      - ./src:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tinysp

  nginx:
    image: nginx:alpine
    container_name: tinysp_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - tinysp

  db:
    image: mariadb:11
    container_name: tinysp_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: tinysp
      MYSQL_USER: tinysp
      MYSQL_PASSWORD: tinysp
    volumes:
      - ./mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      retries: 10
    networks:
      - tinysp

  mailpit:
    image: axllent/mailpit:latest
    container_name: tinysp_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"   # Interface web Mailpit
    networks:
      - tinysp

networks:
  tinysp:
    driver: bridge

volumes:
  db_data:
